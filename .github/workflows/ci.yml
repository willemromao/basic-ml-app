name: CI - Build e Testes do Classificador

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock httpx

      - name: Criar diretórios necessários
        run: |
          mkdir -p intent_classifier/models
          mkdir -p intent_classifier/data

      - name: Rodar testes unitários
        env:
          ENV: dev
          MONGO_URI: ${{ secrets.MONGO_URI }}
          MONGO_DB: ${{ secrets.MONGO_DB }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          WANDB_PROJECT: basic-ml-app
        run: |
          pytest tests/ -v -m "not integration" \
            --cov=app \
            --cov=db \
            --cov-report=term \
            --cov-report=xml

      - name: Rodar testes de integração (opcional)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          ENV: dev
          MONGO_URI: ${{ secrets.MONGO_URI }}
          MONGO_DB: ${{ secrets.MONGO_DB }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          WANDB_PROJECT: basic-ml-app
        run: |
          pytest tests/ -v -m "integration" \
            --cov=app \
            --cov=db \
            --cov-report=term

      - name: Upload cobertura para Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Construir imagem Docker
        run: docker build -t intent-clf:latest -f app/app.Dockerfile .
        
      - name: Resumo dos Testes
        if: always()
        run: |
          echo "### 📊 Resumo do Pipeline CI/CD" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Ambiente:** dev" >> $GITHUB_STEP_SUMMARY
          echo "**MongoDB:** ✅ Conectado" >> $GITHUB_STEP_SUMMARY
          echo "**W&B:** ✅ Conectado" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ **Todos os testes passaram!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Alguns testes falharam. Verifique os logs acima.**" >> $GITHUB_STEP_SUMMARY
          fi